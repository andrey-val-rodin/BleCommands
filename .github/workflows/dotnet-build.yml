name: .NET Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore Source
      
    - name: Build
      run: dotnet build Source --configuration Release --no-restore
      
    - name: Run Unit Tests
      run: dotnet test Source/Tests/Tests.csproj --configuration Release --no-build --verbosity normal